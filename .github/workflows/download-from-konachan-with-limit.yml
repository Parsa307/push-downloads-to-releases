name: Download from Konachan (with limit)

on:
  workflow_dispatch:
    inputs:
      LIMIT:
        description: 'LIMIT'
        required: true
      TAG:
        description: 'TAG'

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.email "parsastdev@duck.com"
          git config --global user.name "Parsast"

      - name: Download from Booru
        run: curl -s "https://konachan.com/post.json?limit=${{ github.event.inputs.LIMIT }}&tags=${{ github.event.inputs.TAG }}" | jq -r '.[].jpeg_url' | aria2c -i-

      - name: Get Downloaded Filename
        id: filename
        run: echo "filename=$(ls -t | head -1)" >> $GITHUB_OUTPUT

      - name: Set Version Info
        id: version
        run: echo "version=v$(date +%Y-%m-%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Create Release on GitHub
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: ${{ steps.filename.outputs.filename }}
          name: ${{ steps.version.outputs.version }}
